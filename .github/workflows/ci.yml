name: CI + CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        package-manager-cache: false

    - name: Enable Corepack and Yarn
      run: |
        corepack enable
        corepack prepare yarn@4.9.1 --activate
        yarn --version

    - name: Install dependencies
      run: yarn install --immutable

    - name: Run ESLint
      run: yarn lint

    - name: Check Prettier formatting
      run: yarn format

    - name: Run TypeScript type check
      run: yarn tsc --noEmit

  build:
    name: Build
    runs-on: self-hosted
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        package-manager-cache: false

    - name: Enable Corepack and Yarn
      run: |
        corepack enable
        corepack prepare yarn@4.9.1 --activate
        yarn --version

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build application
      run: yarn build

  docker:
    name: Docker Build & Deploy
    runs-on: self-hosted
    needs: [build]
    # Only deploy on push to main (not develop, not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t horizon-blog:latest .

    - name: Test Docker image
      run: |
        docker run --rm -d --name test-horizon-blog -p 3000:3000 horizon-blog:latest
        sleep 10
        curl -f http://localhost:3000 || (docker logs test-horizon-blog && exit 1)
        docker stop test-horizon-blog

    - name: Push Docker Image
      run: |
        docker tag horizon-blog:latest ${{ secrets.DOCKERHUB_USERNAME }}/horizon-blog:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/horizon-blog:latest

    - name: Deploy to private server via Watch Tower
      run: |
        curl -X POST "http://${{ secrets.WATCHTOWER_IP }}:8099/v1/update" \
          -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
          --fail --silent --show-error

    - name: Success
      run: echo "Deployed to https://blog.connortran.io.vn"
